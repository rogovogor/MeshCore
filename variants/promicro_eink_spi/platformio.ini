; ProMicro NRF52840 + WeAct Epaper 2.13" + EBYTE E22/E22P (SX1262) or RA-62 (LLCC68)
; Radio: SPI  — SCK=D14, MOSI=D15, MISO=D16, CS=D13, RST=D10, DIO1=D11, BUSY=D19
; Display: SPI1 — SCK=D18, MOSI=D20, CS=D5, DC=D12, RST=D7, BUSY=D8  (MISO not connected — epaper write-only)
; Encoder: LEFT=D3, RIGHT=D4, PRESS=D9 | BACK=D6 (BOOT button)
; GPS: Serial1 (RX=D0, TX=D1), EN=D2

[ProMicro_WeAct_base]
extends = nrf52_base
board = promicro_nrf52840
build_flags = ${nrf52_base.build_flags}
  -I variants/promicro_eink_spi
  -D PROMICRO_WEACT_EINK
  -D USE_SX1262
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D LORA_TX_POWER=22
  -D SX126X_CURRENT_LIMIT=140
  -D SX126X_RX_BOOSTED_GAIN=1
  -D EINK_DISPLAY_MODEL=GxEPD2_213_B74
  -D EINK_SCALE_X=1.953125f
  -D EINK_SCALE_Y=1.28f
  -D EINK_X_OFFSET=0
  -D EINK_Y_OFFSET=10
  -D PIN_DISPLAY_CS=5
  -D PIN_DISPLAY_DC=12
  -D PIN_DISPLAY_RST=7
  -D PIN_DISPLAY_BUSY=8
  -D PIN_USER_BTN=9
  -D ENV_INCLUDE_GPS=1
  -D PIN_GPS_RX=18
  -D PIN_GPS_TX=20
  -D PIN_GPS_EN=21
  -D UI_HAS_JOYSTICK=1
  -D PIN_BUZZER=22
build_src_filter = ${nrf52_base.build_src_filter}
  +<../variants/promicro_eink_spi>
  +<helpers/sensors>
lib_deps = ${nrf52_base.lib_deps}
  stevemarple/MicroNMEA @ ^2.0.6
  zinggjm/GxEPD2 @ 1.6.2
  bakercp/CRC32 @ ^2.0.0

; ---- E22 (standard SX1262, no RX patch) ----

[ProMicro_WeAct_E22]
extends = ProMicro_WeAct_base

[env:ProMicro_WeAct_E22_repeater]
extends = ProMicro_WeAct_E22
build_flags =
  ${ProMicro_WeAct_E22.build_flags}
  -D DISPLAY_CLASS=GxEPDDisplay
  -D ADVERT_NAME='"WeAct E22 Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
build_src_filter = ${ProMicro_WeAct_E22.build_src_filter}
  +<helpers/ui/GxEPDDisplay.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/simple_repeater>
lib_deps = ${ProMicro_WeAct_E22.lib_deps}

[env:ProMicro_WeAct_E22_room_server]
extends = ProMicro_WeAct_E22
build_flags =
  ${ProMicro_WeAct_E22.build_flags}
  -D DISPLAY_CLASS=GxEPDDisplay
  -D ADVERT_NAME='"WeAct E22 Room"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D ROOM_PASSWORD='"hello"'
build_src_filter = ${ProMicro_WeAct_E22.build_src_filter}
  +<helpers/ui/GxEPDDisplay.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/simple_room_server>
lib_deps = ${ProMicro_WeAct_E22.lib_deps}

[env:ProMicro_WeAct_E22_companion_radio_usb]
extends = ProMicro_WeAct_E22
board_build.ldscript = boards/nrf52840_s140_v6_extrafs.ld
board_upload.maximum_size = 712704
build_flags =
  ${ProMicro_WeAct_E22.build_flags}
  -I examples/companion_radio/ui-new
  -D DISPLAY_CLASS=GxEPDDisplay
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D AUTO_OFF_MILLIS=0
  -D OFFLINE_QUEUE_SIZE=256
  -D UI_RECENT_LIST_SIZE=6
  -D UI_SENSORS_PAGE=1
build_src_filter = ${ProMicro_WeAct_E22.build_src_filter}
  +<helpers/ui/GxEPDDisplay.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<helpers/ui/buzzer.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps = ${ProMicro_WeAct_E22.lib_deps}
  adafruit/RTClib @ ^2.1.3
  densaugeo/base64 @ ~1.4.0
  end2endzone/NonBlockingRTTTL@^1.3.0

[env:ProMicro_WeAct_E22_companion_radio_ble]
extends = ProMicro_WeAct_E22
board_build.ldscript = boards/nrf52840_s140_v6_extrafs.ld
board_upload.maximum_size = 712704
build_flags =
  ${ProMicro_WeAct_E22.build_flags}
  -I examples/companion_radio/ui-new
  -D DISPLAY_CLASS=GxEPDDisplay
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D BLE_PIN_CODE=123456
  -D BLE_DEBUG_LOGGING=1
  -D AUTO_OFF_MILLIS=0
  -D OFFLINE_QUEUE_SIZE=256
  -D UI_RECENT_LIST_SIZE=6
  -D UI_SENSORS_PAGE=1
build_src_filter = ${ProMicro_WeAct_E22.build_src_filter}
  +<helpers/ui/GxEPDDisplay.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<helpers/ui/buzzer.cpp>
  +<helpers/nrf52/SerialBLEInterface.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps = ${ProMicro_WeAct_E22.lib_deps}
  adafruit/RTClib @ ^2.1.3
  densaugeo/base64 @ ~1.4.0
  end2endzone/NonBlockingRTTTL@^1.3.0

