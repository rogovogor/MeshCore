name: Build Room Server Firmwares

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - 'room-server-*'

jobs:

  build:
    runs-on: ubuntu-latest
    steps:

      - name: Clone Repo
        uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-environment

      - name: Build Firmwares
        env:
          FIRMWARE_VERSION: ${{ env.GIT_TAG_VERSION }}
        run: |
          SPEC=""
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG_BODY="${GITHUB_REF#refs/tags/room-server-}"
            CANDIDATE="${TAG_BODY%-v*}"
            [[ "$CANDIDATE" != "$TAG_BODY" && -n "$CANDIDATE" ]] && SPEC="$CANDIDATE"
          fi
          if [ -n "$SPEC" ]; then
            /usr/bin/env bash build.sh build-matching-firmwares "${SPEC}_room_server"
          else
            /usr/bin/env bash build.sh build-room-server-firmwares
          fi

      - name: Upload Workflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: room-server-firmwares
          path: out

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Room Server Firmware ${{ env.GIT_TAG_VERSION }}
          body: ""
          draft: true
          files: out/*